name: Publish Benchmarks

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-benchmarks.yml"
      - ".buildkite/pipeline-benchmarks.yml"
      - "benchmarking/**"
      - "src/**"
  pull_request:
    paths:
      - ".github/workflows/publish-benchmarks.yml"
      - ".buildkite/pipeline-benchmarks.yml"
      - "benchmarking/**"
      - "src/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-benchmarks:
    name: "Publish benchmarks"
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download Buildkite Artifacts
        id: download
        uses: EnricoMi/download-buildkite-artifact-action@v1
        with:
          buildkite_token: ${{ secrets.BUILDKITE_TOKEN }}
          ignore_build_states: blocked,canceled,skipped,not_run
          ignore_job_states: timed_out,failed
          output_path: artifacts

      - name: Locate benchmark results
        id: locate
        if: ${{ steps.download.outputs.download-state == 'success' }}
        run: |
          BENCHMARK_FILE=$(find artifacts -type f -name "benchmark_results.json" 2>/dev/null | head -1)
          if [ -n "$BENCHMARK_FILE" ]; then
            echo "path=$BENCHMARK_FILE" >> "$GITHUB_OUTPUT"
            echo "Found benchmark results: $BENCHMARK_FILE"
            echo "Number of entries: $(jq length "$BENCHMARK_FILE")"
          else
            echo "No benchmark_results.json found in artifacts"
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Transform results for github-action-benchmark
        if: ${{ steps.locate.outputs.path != '' }}
        shell: python3 {0}
        run: |
          import json, re, sys, glob

          # Merge all benchmark JSON files (benchmark_results.json + nsys_*.json)
          all_data = []
          for path in sorted(glob.glob("artifacts/**/benchmark_results.json", recursive=True)):
              with open(path) as f:
                  all_data.extend(json.load(f))
          for path in sorted(glob.glob("artifacts/**/nsys_*.json", recursive=True)):
              with open(path) as f:
                  all_data.extend(json.load(f))

          # Save merged results
          with open("benchmark_results_merged.json", "w") as f:
              json.dump(all_data, f, ensure_ascii=False, indent=2)

          data = []
          for d in all_data:
              name = d["name"]
              ft = d["float_type"]
              grid = d["grid_size"]
              grid_str = f"{grid[0]}x{grid[1]}x{grid[2]}"
              gpu = d.get("metadata", {}).get("gpu_name", "GPU")
              pps = d["grid_points_per_second"]

              # Extract advection and closure from name
              # Name pattern: EarthOcean_{size}_{ft}_{mom_adv}_{trc_adv}_{closure}
              m = re.match(
                  r"EarthOcean_(\d+x\d+x\d+)_(F\d+)_(.+?)_(WENO\d+|Centered\d+|nothing)_(.+)",
                  name,
              )
              if not m:
                  # IO benchmark or other format - use the full name
                  chart_name = f"Other/{name}/{gpu}"
                  data.append({"name": chart_name, "unit": "points/s", "value": pps})
              else:
                  size_str = m.group(1)
                  ft_short = m.group(2)
                  mom_adv = m.group(3)
                  trc_adv = m.group(4)
                  closure = m.group(5)

                  chart_name = f"EarthOcean [{ft_short}]/{mom_adv} + {trc_adv}/{closure}/{gpu}/{size_str}"
                  data.append({"name": chart_name, "unit": "points/s", "value": pps})

              # Add nsys kernel data as separate chart entries if present
              if "nsys_top_kernels" in d:
                  for kernel in d["nsys_top_kernels"]:
                      # Use shorter kernel name (strip template parameters)
                      kname = kernel["name"]
                      # Truncate long CUDA kernel names at first '<' or '(' for readability
                      short_kname = re.split(r"[<(]", kname)[0].strip()
                      if len(short_kname) > 60:
                          short_kname = short_kname[:57] + "..."

                      # Total kernel time in milliseconds (smaller is better, but we track
                      # instances and avg time as "customSmallerIsBetter" isn't available
                      # in the same chart, so we report throughput = instances / total_time_ms)
                      total_ms = kernel["total_time_ns"] / 1e6
                      instances = kernel["instances"]

                      kernel_chart = f"NSYS Kernels/{name}/{short_kname}"
                      data.append({
                          "name": kernel_chart,
                          "unit": "ms (total GPU time)",
                          "value": total_ms,
                      })

          with open("github-action-benchmark.json", "w") as f:
              json.dump(data, f, indent=2)

          print(f"Transformed {len(data)} benchmark entries for visualization")
          for d in data:
              print(f"  {d['name']}: {d['value']:.4g} {d['unit']}")

      - name: Create job summary
        if: ${{ steps.locate.outputs.path != '' }}
        run: |
          # Copy markdown report if available
          MD_FILE=$(find artifacts -type f -name "benchmark_results.md" 2>/dev/null | head -1)
          if [ -n "$MD_FILE" ]; then
            cat "$MD_FILE" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Also show comparison if available
          COMP_FILE=$(find artifacts -type f -name "benchmark_comparison.md" 2>/dev/null | head -1)
          if [ -n "$COMP_FILE" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "$COMP_FILE" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Push results to OceananigansBenchmarks repo
        if: ${{ github.event_name == 'push' && steps.locate.outputs.path != '' }}
        run: |
          git clone https://x-access-token:${{ secrets.BENCHMARKS_TOKEN }}@github.com/NumericalEarth/OceananigansBenchmarks.git
          cd OceananigansBenchmarks
          DIRNAME="benchmarks/by_branch/${{ github.head_ref || github.ref_name }}/${{ github.sha }}"
          mkdir -vp "${DIRNAME}"
          cp -v "../benchmark_results_merged.json" "${DIRNAME}/benchmark_results.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Save benchmark results for commit ${{ github.sha }}"
          git push -u origin main

      - uses: benchmark-action/github-action-benchmark@v1
        if: ${{ steps.locate.outputs.path != '' }}
        with:
          name: Oceananigans.jl Benchmarks
          tool: "customBiggerIsBetter"
          output-file-path: "github-action-benchmark.json"
          benchmark-data-dir-path: "."
          gh-repository: "github.com/NumericalEarth/OceananigansBenchmarks"
          github-token: ${{ secrets.BENCHMARKS_TOKEN }}
          comment-always: false
          summary-always: true
          alert-threshold: "110%"
          fail-on-alert: false
          auto-push: ${{ github.event_name == 'push' }}
          max-items-in-chart: 50
          comment-on-alert: true
