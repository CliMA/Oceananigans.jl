      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: src,ext

      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: reactant_2
          token: ${{ secrets.CODECOV_TOKEN }}

  reactant_3:
    name: Reactant LLG Simulations - Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11.9'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          check_bounds: auto
        env:
          TEST_GROUP: "reactant_3"
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: src,ext

      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: reactant_3
          token: ${{ secrets.CODECOV_TOKEN }}

  metal:
    name: Metal - Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - macos-latest
        arch:
          - arm64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          TEST_GROUP: "metal"
      - uses: julia-actions/julia-processcoverage@v1
        with:
          # default is src,ext — include others if you need them
          directories: src,ext

      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: ${{ env.TEST_GROUP }}   # optional but strongly recommended
          token: ${{ secrets.CODECOV_TOKEN }}  # only needed for some repos (see below)

      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: ${{ env.TEST_GROUP }}   # optional but strongly recommended
          token: ${{ secrets.CODECOV_TOKEN }}  # only needed for some repos (see below)
